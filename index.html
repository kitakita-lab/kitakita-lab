<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#F7F8F6" />

    <title>KitaKita Lab｜ちょっと進めてみる</title>
    <meta
      name="description"
      content="KitaKita Lab（キタキタラボ）は、北海道の「ちょっと進めてみる」ための場所です。ワークショップ、AIやシステムづくり、地域や企業との企画——大きな約束はしません。ちょっと前へ、ちょっと良く、ちょっと豊かになる時間と出会いを届けます。"
    />

    <!-- canonical is set per-route by <Seo> (react-helmet-async); a static
         one here would linger as a duplicate, since Helmet only manages
         tags it renders itself, not pre-existing static ones. -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KitaKita Lab" />
    <meta property="og:title" content="KitaKita Lab｜ちょっと進めてみる" />
    <meta
      property="og:description"
      content="ちょっと前へ。ちょっと良く。ちょっと豊かに。北海道の「ちょっと進めてみる」ための場所です。"
    />
    <meta property="og:url" content="https://kitakita-lab.com/" />
    <!-- og:image は PNG 必須（SVG は X / Facebook / LINE 等で描画されない）。
         再生成は scripts/generate-og.mjs を参照。 -->
    <meta property="og:image" content="https://kitakita-lab.com/ogp.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="KitaKita Lab — ちょっと進めてみる" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KitaKita Lab｜ちょっと進めてみる" />
    <meta
      name="twitter:description"
      content="ちょっと前へ。ちょっと良く。ちょっと豊かに。北海道から。"
    />
    <meta name="twitter:image" content="https://kitakita-lab.com/ogp.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts without blocking render: the page paints immediately with the
         system-font fallback, then swaps to the web fonts once loaded. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700&display=swap"
      />
    </noscript>

    <!-- Structured data (Organization) for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "KitaKita Lab",
        "alternateName": "キタキタラボ",
        "url": "https://kitakita-lab.com/",
        "logo": "https://kitakita-lab.com/icon-512.png",
        "image": "https://kitakita-lab.com/ogp.png",
        "description": "北海道の「ちょっと進めてみる」ための場所。ワークショップ、AIやシステムづくり、地域や企業との企画を通じて、ちょっと前へ、ちょっと良く、ちょっと豊かになる時間と出会いを届けます。"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
